<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Feliz Cumpleaños Ñañita!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden;
            position: relative;
        }

        .card {
            background: white;
            width: 85%;
            max-width: 380px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid #ff9a9e;
            object-fit: cover;
            margin: 0 auto 15px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ff6b6b;
            font-size: 2rem;
            margin: 5px 0;
        }

        .viejas-text {
            color: #ff5252;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .timer-container {
            background: #fff0f0;
            padding: 12px;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px dashed #ff6b6b;
        }

        #timer {
            font-size: 1rem;
            font-weight: 700;
            color: #333;
        }

        .message {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .btn-surprise {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
            transition: 0.3s;
            z-index: 11;
            width: 100%;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-surprise:active { transform: scale(0.95); }

        .footer-signature {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 0.7rem;
            color: white;
            font-weight: bold;
            z-index: 5;
        }

        /* AJUSTE PARA FOTOS EN CELULAR */
        .flying-photo {
            width: 70px; /* Un poco más pequeñas para que no tapen todo el celular */
            height: 70px;
            border-radius: 10px;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            object-fit: cover;
            position: fixed; /* Fixed para asegurar posición en pantalla móvil */
            pointer-events: none;
            z-index: 100;
            opacity: 0;
        }
    </style>
</head>
<body>

    <div class="footer-signature">DAMT <br> 13/04/2026</div>

    <div class="card">
        <img src="https://i.ibb.co/ZpsKW1vr/Whats-App-Image-2026-04-13-at-1-30-13-PM.jpg" class="profile-img">
        <h1>¡Feliz Cumple, Ñañita! 🎂</h1>
        <div class="viejas-text">YA ESTAS VIEJA🫂🤗🤣🎈</div>

        <div class="message">
            ¡Hoy celebramos tus 22 años! 🎉 Gracias por ser buena en todo lo que haces. ¡Te quiero muchísimo! 💖<br>
            ¡QUE LA PASES BIEN HOY DIA!🎊🎊❤️
        </div>

        <div class="timer-container">
            <div id="timer">Calculando...</div>
        </div>

        <button id="surpriseBtn" class="btn-surprise" onclick="lanzarSorpresaTotal()">¡MÁS SORPRESAS! 🎁</button>
    </div>

    <script>
        const flyingPhotosLinks = [
            'https://i.ibb.co/PGK5D6jx/Whats-App-Image-2026-04-13-at-1-42-42-PM.jpg',
            'https://i.ibb.co/PzJjK5NQ/Whats-App-Image-2026-04-13-at-1-45-27-PM.jpg',
            'https://i.ibb.co/jP9w2x9L/Whats-App-Image-2026-04-13-at-1-45-37-PM-1.jpg',
            'https://i.ibb.co/Mkqx06c0/Whats-App-Image-2026-04-13-at-1-45-36-PM-1.jpg',
            'https://i.ibb.co/fzJhQRDx/Whats-App-Image-2026-04-13-at-1-45-37-PM.jpg'
        ];

        function lanzarSorpresaTotal() {
            // Confeti
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.7 }
            });

            const btn = document.getElementById('surpriseBtn');
            const rect = btn.getBoundingClientRect();
            
            // Punto de salida: centro del botón
            const centerX = rect.left + rect.width / 2;
            const centerY = rect.top + rect.height / 2;

            for (let i = 0; i < 10; i++) {
                const img = document.createElement('img');
                img.src = flyingPhotosLinks[Math.floor(Math.random() * flyingPhotosLinks.length)];
                img.className = 'flying-photo';
                document.body.appendChild(img);

                // Ángulo aleatorio para que "exploten" hacia todas partes
                const angle = Math.random() * Math.PI * 2;
                const distance = 100 + Math.random() * 150; // Cuanto se alejan del centro
                
                const destX = centerX + Math.cos(angle) * distance - 35; // -35 es mitad del ancho de la foto
                const destY = centerY + Math.sin(angle) * distance - 35;

                // Animación GSAP mejorada para celular
                gsap.fromTo(img, 
                    { x: centerX - 35, y: centerY - 35, scale: 0.1, opacity: 0, rotation: 0 },
                    { 
                        duration: 0.8, 
                        x: destX, 
                        y: destY, 
                        scale: 1, 
                        opacity: 1, 
                        rotation: Math.random() * 720,
                        ease: "back.out(1.7)",
                        onComplete: () => {
                            // Después de explotar, caen suavemente y desaparecen
                            gsap.to(img, {
                                duration: 2,
                                y: window.innerHeight + 100,
                                opacity: 0,
                                rotation: "+=180",
                                delay: 1,
                                onComplete: () => img.remove()
                            });
                        }
                    }
                );
            }
        }

        const fechaNacimiento = new Date(2004, 3, 13); 
        function actualizarContador() {
            const ahora = new Date();
            const diferencia = ahora - fechaNacimiento;
            const años = ahora.getFullYear() - fechaNacimiento.getFullYear();
            const diasTotales = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            document.getElementById('timer').innerHTML = 
                `<span style="color: #ff6b6b; font-size: 1.3rem;">${años} Años</span><br>` +
                `${diasTotales.toLocaleString()} días y contando...`;
        }
        setInterval(actualizarContador, 1000);
        actualizarContador();
    </script>
</body>
</html>
