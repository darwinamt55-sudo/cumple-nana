<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>¡Feliz Cumpleaños Ñañita!</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Quicksand:wght@400;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>

    <style>
        body {
            margin: 0;
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            font-family: 'Quicksand', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow: hidden; /* Importante para que no salgan barras de desplazamiento */
            position: relative;
        }

        .card {
            background: white;
            width: 85%;
            max-width: 380px;
            padding: 25px;
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.2);
            text-align: center;
            z-index: 10; /* La tarjeta siempre por debajo de las fotos */
            position: relative;
        }

        .profile-img {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid #ff9a9e;
            object-fit: cover;
            margin: 0 auto 15px;
            display: block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ff6b6b;
            font-size: 2rem;
            margin: 5px 0;
        }

        .viejas-text {
            color: #ff5252;
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 10px;
        }

        .timer-container {
            background: #fff0f0;
            padding: 12px;
            border-radius: 15px;
            margin: 15px 0;
            border: 2px dashed #ff6b6b;
        }

        #timer {
            font-size: 1rem;
            font-weight: 700;
            color: #333;
        }

        .message {
            color: #555;
            font-size: 0.9rem;
            line-height: 1.4;
            margin-bottom: 15px;
        }

        .btn-surprise {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 15px 25px;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(255,107,107,0.4);
            transition: 0.3s;
            z-index: 11;
            width: 100%;
            -webkit-tap-highlight-color: transparent; /* Quita el flash azul en celular */
        }

        .btn-surprise:active { transform: scale(0.95); }

        .footer-signature {
            position: absolute;
            bottom: 15px;
            left: 15px;
            font-size: 0.7rem;
            color: white;
            font-weight: bold;
            z-index: 5;
        }

        /* --- ESTILO DE LAS FOTOS CONFETI (CORREGIDO PARA CELULAR) --- */
        .confetti-photo {
            width: 80px; /* Tamaño perfecto para que se vea en celular */
            height: 80px;
            border-radius: 12px;
            border: 3px solid white;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            object-fit: cover;
            position: fixed; /* FIXED asegura que se renderice sobre la pantalla, no sobre la tarjeta */
            pointer-events: none;
            z-index: 9999; /* Z-INDEX ALTÍSIMO para estar sobre todo */
            opacity: 0;
        }
        /* ------------------------------------------------------------ */
    </style>
</head>
<body>

    <div class="footer-signature">DAMT <br> 13/04/2026</div>

    <div class="card">
        <img src="https://i.ibb.co/ZpsKW1vr/Whats-App-Image-2026-04-13-at-1-30-13-PM.jpg" class="profile-img">
        <h1>¡Feliz Cumple, Ñañita! 🎂</h1>
        <div class="viejas-text">YA ESTAS VIEJA🫂🤗🤣🎈</div>

        <div class="message">
            ¡Hoy celebramos tus 22 años! 🎉 Gracias por ser buena en todo lo que haces. ¡Te quiero muchísimo! 💖<br>
            ¡QUE LA PASES BIEN HOY DIA!🎊🎊❤️
        </div>

        <div class="timer-container">
            <div id="timer">Calculando...</div>
        </div>

        <button id="surpriseBtn" class="btn-surprise" onclick="lanzarSorpresaTotal()">¡MÁS SORPRESAS! 🎁</button>
    </div>

    <script>
        const flyingPhotosLinks = [
            'https://i.ibb.co/PGK5D6jx/Whats-App-Image-2026-04-13-at-1-42-42-PM.jpg',
            'https://i.ibb.co/PzJjK5NQ/Whats-App-Image-2026-04-13-at-1-45-27-PM.jpg',
            'https://i.ibb.co/jP9w2x9L/Whats-App-Image-2026-04-13-at-1-45-37-PM-1.jpg',
            'https://i.ibb.co/Mkqx06c0/Whats-App-Image-2026-04-13-at-1-45-36-PM-1.jpg',
            'https://i.ibb.co/fzJhQRDx/Whats-App-Image-2026-04-13-at-1-45-37-PM.jpg'
        ];

        function lanzarSorpresaTotal() {
            // 1. Confeti normal de fondo
            confetti({
                particleCount: 100,
                spread: 70,
                origin: { y: 0.7 }
            });

            // 2. Explosión de fotos tipo confeti
            const btn = document.getElementById('surpriseBtn');
            const rect = btn.getBoundingClientRect();
            
            // Punto de origen exacto: centro del botón en la pantalla
            const startX = rect.left + rect.width / 2;
            const startY = rect.top + rect.height / 2;

            for (let i = 0; i < 12; i++) {
                const img = document.createElement('img');
                img.src = flyingPhotosLinks[Math.floor(Math.random() * flyingPhotosLinks.length)];
                img.className = 'confetti-photo';
                // Importante: añadir al body, no a la tarjeta
                document.body.appendChild(img);

                // Configurar posición inicial: centrada en el botón
                gsap.set(img, { x: startX - 40, y: startY - 40, scale: 0.1, opacity: 0 });

                // Calcular trayectoria circular aleatoria (explosión)
                const angle = Math.random() * Math.PI * 2; // Ángulo aleatorio 360°
                const velocity = 15 + Math.random() * 25; // Fuerza del disparo
                
                const tx = Math.cos(angle) * velocity * 12; 
                const ty = Math.sin(angle) * velocity * 12;

                // Animación: Explosión y luego caída suave
                gsap.to(img, {
                    duration: 0.8,
                    scale: 1,
                    opacity: 1,
                    x: `+=${tx}`,
                    y: `+=${ty}`,
                    rotation: Math.random() * 720, // Muchas vueltas
                    ease: "power2.out",
                    onComplete: () => {
                        // Caída suave tipo gravedad
                        gsap.to(img, {
                            duration: 3 + Math.random() * 2, // Tiempo de caída
                            y: window.innerHeight + 100, // Cae hasta salir de la pantalla
                            x: `+=${(Math.random() - 0.5) * 200}`, // Movimiento horizontal suave
                            rotation: "+=360",
                            opacity: 0, // Se desvanece al final
                            ease: "power1.in",
                            onComplete: () => img.remove() // Eliminar del DOM para no gastar memoria
                        });
                    }
                });
            }
        }

        // Contador dinámico
        const fechaNacimiento = new Date(2004, 3, 13); 
        function actualizarContador() {
            const ahora = new Date();
            const diferencia = ahora - fechaNacimiento;
            const años = ahora.getFullYear() - fechaNacimiento.getFullYear();
            const diasTotales = Math.floor(diferencia / (1000 * 60 * 60 * 24));
            document.getElementById('timer').innerHTML = 
                `<span style="color: #ff6b6b; font-size: 1.3rem;">${años} Años</span><br>` +
                `${diasTotales.toLocaleString()} días y contando...`;
        }
        setInterval(actualizarContador, 1000);
        actualizarContador();
    </script>
</body>
</html>
